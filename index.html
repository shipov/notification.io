<!DOCTYPE html>
<html>

<head>
    <title>Notyfication</title>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
</head>

<body>

    <div class="notification success" id="task-created-notification">
        <div class="notification-icon"><img src="icon_n.svg" width="100%"></div>
        <div class="notification-content">
            <h4>Задача успешно создана</h4>
            <div class="wrap">
                <p>Вы можете перейти к её редактированию<br>или назначить исполнителя.</p>
                <div class="wrap_button">
                    <button class="btn-primary" onclick="navigateToTask()">Перейти к задаче</button>
                    <button class="btn-close" onclick="hideNotification()">Закрыть</button>
                </div>
            </div>
            <button class="notification-close" onclick="hideNotification()"></button>
        </div>
    </div>


    </div>

</body>

<style>
    @font-face {
        font-family: 'MTSWide-Medium';
        src: url("font/MTSWide-Medium.woff2") format("woff2");
    }

    @font-face {
        font-family: 'MTSWide-Bold';
        src: url("font/MTSWide-Bold.woff2") format("woff2");
    }

    @font-face {
        font-family: 'MTSWide-Regular';
        src: url("font/MTSWide-Regular.woff2") format("woff2");
    }

    @font-face {
        font-family: 'MTSWide-Light';
        src: url("font/MTSWide-Light.woff2") format("woff2");
    }

    @font-face {
        font-family: 'Acrom-Regular';
        src: url("font/Acrom-Regular.woff2") format("woff2");
    }

    body {
        background: #E0EAFC;
        /* fallback for old browsers */
        background: -webkit-linear-gradient(to right, #CFDEF3, #E0EAFC);
        /* Chrome 10-25, Safari 5.1-6 */
        background: linear-gradient(to right, #CFDEF3, #E0EAFC);
        /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */

    }

    .wrap {
        display: flex;
        flex-direction: column;
    }

    .wrap_button {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        margin-top: 14px;
        gap: 12px;
    }

    .notification {
        display: flex;
        align-items: flex-start;
        background-color: #FBFEFC;
        border: 1px solid #72B9BC;
        border-radius: 8px;
        padding: 16px;
        width: 380px;
        height: 110px;
        max-width: calc(100vw - 40px);
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;
        animation: slideIn 0.3s ease-out;
        transition: .2s ease-in-out;
    }

    .notification:hover {
        box-shadow: 0 10px 24px #2e81853b;
    }

    .notification-icon {
        margin-right: 16px;
        font-size: 20px;
        color: #155724;
    }

    .notification-content {
        flex: 1;
        margin-right: 12px;
    }

    .notification-content h4 {
        margin: 0 0 8px 0;
        font-size: 15px;
        font-weight: 600;
        color: #000;
        letter-spacing: 0.052rem;
        font-family: 'MTSWide-Regular';
    }

    .notification-content p {
        margin: 0;
        font-size: 12px;
        color: #000;
        line-height: 1rem;
        font-family: 'Acrom-Regular';
    }

    .btn-primary {
        background-color: #72B9BC;
        color: white;
        border: 1px solid #4CA0A3;
        text-shadow: 0 0.032rem 0 #000000b8;
        padding: 8px 16px;
        border-radius: 50px;
        cursor: pointer;
        font-size: 10px;
        white-space: nowrap;
        font-family: 'MTSWide-Medium';
        width: 60%;
        height: 32px;
        transition: .2s all;
    }

    .btn-primary:hover {
        background-color: #4CA0A3;
    }

    .btn-close {
        background-color: #fff;
        color: black;
        border: 1px solid #C7E3E4;
        padding: 8px 16px;
        border-radius: 50px;
        cursor: pointer;
        font-size: 10px;
        white-space: nowrap;
        font-family: 'MTSWide-Medium';
        width: 40%;
        height: 32px;
        transition: .2s all;
    }

    .btn-close:hover {
        border: 1px solid #C7E3E4;
        background: #C7E3E4;
        color: black;
    }

    .notification-close {
        background: #fff no-repeat center center url("data:image/svg+xml,%3Csvg width='5' height='5' viewBox='0 0 5 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M4.5 4.5L0.5 0.5ZM0.5 4.5L4.5 0.5Z' fill='%2301A08E' style='fill:%2301A08E;fill:color(display-p3 0.0039 0.6275 0.5569);fill-opacity:1;'/%3E%3Cpath d='M4.5 4.5L0.5 0.5M0.5 4.5L4.5 0.5' stroke='black' style='stroke:black;stroke-opacity:1;' stroke-linecap='round'/%3E%3C/svg%3E%0A");
        background-size: 30%;
        border: 1px solid #C7E3E4;
        border-radius: 50px;
        font-size: 20px;
        cursor: pointer;
        color: #000;
        padding: 0;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        margin: auto;
        top: 12px;
        right: 12px;
        transition: .2s ease-in-out;
    }

    .notification-close:hover {
        background: #C7E3E4 no-repeat center center url("data:image/svg+xml,%3Csvg width='5' height='5' viewBox='0 0 5 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M4.5 4.5L0.5 0.5ZM0.5 4.5L4.5 0.5Z' fill='%2301A08E' style='fill:%2301A08E;fill:color(display-p3 0.0039 0.6275 0.5569);fill-opacity:1;'/%3E%3Cpath d='M4.5 4.5L0.5 0.5M0.5 4.5L4.5 0.5' stroke='black' style='stroke:black;stroke-opacity:1;' stroke-linecap='round'/%3E%3C/svg%3E%0A");
        background-size: 30%;
    }

    @keyframes slideIn {
        from {
            transform: translateY(-100%);
            opacity: 0;
        }

        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    .progress-notification {
        position: relative;
        padding-bottom: 8px;
    }

    .progress-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 3px;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        background: white;
        width: 0%;
        transition: width 0.1s linear;
    }
</style>

<script type="text/javascript" src="init.js"></script>

</html>
